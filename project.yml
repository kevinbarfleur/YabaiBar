name: VibeNotch
options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.45.3
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    CODE_SIGN_STYLE: Automatic
targets:
  VibeNotchCore:
    type: framework
    platform: macOS
    sources:
      - Sources/VibeNotchCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinbarfleur.VibeNotchCore
        PRODUCT_NAME: VibeNotchCore
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        CODE_SIGNING_ALLOWED: NO
  YabaiBarSignalHelper:
    type: tool
    platform: macOS
    sources:
      - Sources/YabaiBarSignalHelper
    dependencies:
      - target: VibeNotchCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinbarfleur.YabaiBarSignalHelper
        PRODUCT_NAME: YabaiBarSignalHelper
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
  VibeNotch:
    type: application
    platform: macOS
    sources:
      - Sources/VibeNotch
      - Resources
    dependencies:
      - target: VibeNotchCore
      - target: YabaiBarSignalHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinbarfleur.VibeNotch
        PRODUCT_NAME: VibeNotch
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: VibeNotch
        INFOPLIST_KEY_LSUIElement: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.5.0
        CODE_SIGN_IDENTITY: "-"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    postBuildScripts:
      - name: Copy YabaiBarSignalHelper
        script: |
          HELPER="${BUILT_PRODUCTS_DIR}/YabaiBarSignalHelper"
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/YabaiBarSignalHelper"
          /bin/rm -f "${DEST}"
          /usr/bin/ditto "${HELPER}" "${DEST}"
    scheme:
      testTargets:
        - VibeNotchCoreTests
  VibeNotchCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/VibeNotchCoreTests
    dependencies:
      - target: VibeNotchCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinbarfleur.VibeNotchTests
        PRODUCT_NAME: VibeNotchTests
        GENERATE_INFOPLIST_FILE: YES
